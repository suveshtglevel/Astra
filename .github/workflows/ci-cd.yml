name: Astra Backend CI/CD (EC2 Deploy)

on:
  push:
    branches: [main]

jobs:

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests found"

      - name: Build backend
        run: npm run build || echo "No build step"


  deploy:
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e

            echo "Deployment started"

            # Ensure repository exists
            if [ ! -d "~/Astra" ]; then
              git clone https://github.com/suveshtglevel/Astra.git ~/Astra
            fi

            cd ~/Astra

            # Sync with latest remote state
            git fetch origin main
            git reset --hard origin/main

            cd backend
            npm ci

            # Remove existing PM2 process to avoid duplicates
            pm2 delete astra-backend || true

            # Start fresh instance
            pm2 start src/server.js --name astra-backend

            pm2 save

            # Health check after deployment
            sleep 5

            if ! curl -f http://localhost:5000/health; then
              echo "Deployment failed, rolling back"

              git reset --hard HEAD~1 || true
              npm ci

              pm2 delete astra-backend || true
              pm2 start src/server.js --name astra-backend
              pm2 save

              exit 1
            fi

            echo "Deployment successful"