name: Astra Backend CI/CD (EC2 Deploy)

on:
  push:
    branches: [main]

jobs:

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests found"

      - name: Build backend
        run: npm run build || echo "No build step"


  deploy:
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e

            echo "🚀 Starting deployment..."

            cd ~/Astra || git clone https://github.com/suveshtglevel/Astra.git ~/Astra
            cd ~/Astra

            # =========================
            # 🔥 SAVE CURRENT VERSION
            # =========================
            echo "💾 Saving current commit for rollback"
            git rev-parse HEAD > ~/Astra_last_good_commit.txt || true

            # =========================
            # 🔥 UPDATE CODE
            # =========================
            git reset --hard
            git pull origin main

            cd backend
            npm ci

            # =========================
            # 🔥 SAFE PM2 START
            # =========================
            echo "🔄 Starting app..."

            pm2 describe astra-backend > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 reload astra-backend
            else
              pm2 start src/server.js --name astra-backend
            fi

            pm2 save

            # =========================
            # 🧪 HEALTH CHECK
            # =========================
            echo "🩺 Checking server health..."

            sleep 5

            if ! curl -f http://localhost:5000/health; then
              echo "❌ Server failed after deploy! Rolling back..."

              # =========================
              # 🔁 ROLLBACK LOGIC
              # =========================
              cd ~/Astra

              git reset --hard $(cat ~/Astra_last_good_commit.txt)

              cd backend
              npm ci

              pm2 reload astra-backend

              echo "🔁 Rollback completed!"
              exit 1
            fi

            echo "✅ Deployment successful!"