name: Astra Backend CI/CD (EC2 Deploy)

on:
  push:
    branches: [main]

jobs:

  # 🔹 Backend CI
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests found"

      - name: Build backend
        run: npm run build || echo "No build step"


  # 🔹 Deploy to EC2
  deploy:
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "🚀 Starting deployment..."

            # 🔥 FIX 1: always go to correct folder
            cd ~/Astra || git clone https://github.com/suveshtglevel/Astra.git ~/Astra
            cd ~/Astra

            echo "📥 Pulling latest code"
            git reset --hard
            git pull origin main

            echo "📦 Installing dependencies"
            cd backend
            npm install

            echo "🔄 Restarting PM2 safely"

            # 🔥 FIX 2: avoid duplicate processes
            pm2 delete astra-backend || true

            # 🔥 FIX 3: use correct entry file
            pm2 start src/server.js --name astra-backend

            pm2 save

            echo "✅ Deployment successful!"